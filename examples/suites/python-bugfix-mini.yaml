defaults:
  max_tokens: 384
  stop_sequences: []
  temperature: 0.0
description: 14 hand-authored Python 'fix-this-bug' tasks covering off-by-one 
  errors, mutable defaults, resource handling, equality pitfalls, and recursion.
  Regex-based metrics look for the canonical fix pattern, so pass-rate is a 
  lower bound.
name: python-bugfix-mini
test_cases:
  - expected_output: null
    id: python-bugfix/01
    max_tokens: null
    metrics:
      - name: regex-match
        params:
          pattern: range\s*\(\s*1\s*,\s*n\s*\+\s*1\s*\)
    prompt: "Fix the bug in this Python function so it returns the sum of integers
      from 1 to n inclusive (e.g. n=3 → 6). Respond with the corrected code only.\n\
      \ndef sum_to(n):\n    total = 0\n    for i in range(n):\n        total += i\n\
      \    return total\n"
    reference_data:
      description: Off-by-one in range
    stop_sequences: null
    system_prompt: null
    tags:
      - python-bugfix
      - code
    temperature: null
  - expected_output: null
    id: python-bugfix/02
    max_tokens: null
    metrics:
      - name: regex-match
        params:
          pattern: items\s*=\s*None
    prompt: "Fix the classic bug here so each call starts with an empty list. Respond
      with the corrected code only.\n\ndef append_item(item, items=[]):\n    items.append(item)\n\
      \    return items\n"
