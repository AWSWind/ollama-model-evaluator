  stop_sequences: []
  temperature: 0.0
description: 'Spider (validation split): natural-language → SQL across 200 cross-domain
  databases. Strict metric: whitespace-tolerant case-insensitive equality against
  the gold SQL (misses many semantically-correct-but-differently-phrased queries —
  treat pass-rate as a lower bound).'
name: spider-sql
