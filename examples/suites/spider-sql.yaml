  - expected_output: SELECT DISTINCT T1.first_name ,  T1.middle_name ,  
      T1.last_name FROM Students AS T1 JOIN Student_Enrolment AS T2 ON 
      T1.student_id  =  T2.student_id JOIN Degree_Programs AS T3 ON 
      T2.degree_program_id  =  T3.degree_program_id WHERE T3.degree_summary_name  
      =  'Bachelor'
    id: spider/student_transcripts_tracking/0
    max_tokens: null
    metrics:
      - name: regex-match
        params:
          flags: i
          pattern: select\ distinct\ t1\.first_name\ ,\ t1\.middle_name\ ,\ 
            t1\.last_name\ from\ students\ as\ t1\ join\ student_enrolment\ as\ 
            t2\ on\ t1\.student_id\ =\ t2\.student_id\ join\ degree_programs\ 
            as\ t3\ on\ t2\.degree_program_id\ =\ t3\.degree_program_id\ where\ 
            t3\.degree_summary_name\ =\ 'bachelor'
    prompt: "You are writing SQL against the 'student_transcripts_tracking' database.\n\
      Question: What are the first, middle, and last names for everybody enrolled
      in a Bachelors program?\nWrite a single SQL query that answers the question.
      Respond with only the SQL — no explanation, no markdown fences, no trailing
      comments. End your response with a single newline."
    reference_data:
      db_id: student_transcripts_tracking
      gold_query: SELECT DISTINCT T1.first_name ,  T1.middle_name ,  
        T1.last_name FROM Students AS T1 JOIN Student_Enrolment AS T2 ON 
        T1.student_id  =  T2.student_id JOIN Degree_Programs AS T3 ON 
        T2.degree_program_id  =  T3.degree_program_id WHERE 
        T3.degree_summary_name  =  'Bachelor'
