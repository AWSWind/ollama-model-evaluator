      differences (ADs) in event rates and the number of patients needed to harm 1
      patient (NNH) were determined.\nSeven eligible RCTs (19,818 patients) reported
      CVAE results. When considering all RCTs, the AD of the primary endpoint (CVAE)
      between the 2 arms (0.52%), tamoxifen versus AI, was statistically significant
      (RR, 1.31; 95% CI, 1.07-1.60; P= .007). This translated into an NNH value of
      189 patients; when only third-generation AIs were considered, the difference
      (0.57%) remained significant (RR, 1.34; 95% CI, 1.09-1.63; P= .0038). Thromboembolic
      events were significantly more frequent in the tamoxifen arm, regardless of
      the strategy adopted (RR, 0.53; 95% CI, 0.42-0.65; P<.0001), without significant
