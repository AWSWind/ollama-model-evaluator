      positively influenced median PFS, both in the entire TKI-treated cohort (median
      PFS 34.7 months versus 11.6 months; hazard ratio [HR] 0.29; 95% CI 0.09-0.98;
      p = 0.03) and in the TKI-treated PTC cohort (n = 22) [log-rank p = 0.086; HR
      2.95; 95 % CI 0.81-10.70). However, in TKI-treated patients, PDTC histologic
      subtype was the only independent prognostic factor for PFS identified in the
