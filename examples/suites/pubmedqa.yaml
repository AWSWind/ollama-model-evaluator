      45 osteochondral and 19 chondral injuries. A bone bruise was defined as a typical
      subcortical area of signal loss, with various shapes, on T1-weighted images
      and of increased signal intensity on T2-weighted and FIR images. The cortical
      bone and articular cartilage were normal in all cases, while osteochondral injuries
      exhibited associated bone and cartilage damage with the same abnormal MR signal
      intensity. Sprain was the mechanism of injury in 52 cases, bruise in 12 and
