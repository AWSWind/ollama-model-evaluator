      Alcohol intake also predicted central systolic BP and carotid cross-sectional
      wall area (CSWA) at follow-up. Waist circumference was another predictor of
      BP changes [β = 0.18 cm (95% CI: 0.05-0.24)]and CSWA. HIV infection was inversely
      associated with increased BP.\n\nQuestion: Are behavioural risk factors to be
      blamed for the conversion from optimal blood pressure to hypertensive status
      in Black South Africans?\nAnswer with exactly one word: yes, no, or maybe."
