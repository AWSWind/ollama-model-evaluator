      (kappa) and SLBM ability for detecting pupil sizes over 6.0 mm.\nThe mean (±standard
      deviation [SD]) pupil diameter was 5.81 ± 0.70 mm with SLBM and 6.26 ± 0.68 mm
      with CIP (p = 0.01) averaging both examiner's results. Mean differences between
      the SLBM and CIP were -0.60 mm and -0.30 mm for each examiner using the average
      of the three readings (p = 0.02), and they were very similar using the first
      reading. Intraobserver reproducibility: the width of the 95% LoA ranged from
      1.79 to 2.30 mm. The ICCs were 0.97 and 0.92 for SLBM, and 0.96 and 0.90 for
      CIP. Interobserver reproducibility: the width of the LoA ranged from 1.82 to
      2.09 mm. Kappa statistics were 0.39 and 0.49 for the first and mean SLBM readings,
