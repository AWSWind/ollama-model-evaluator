      in the district during the time of the study; data were also collected at the
      third MOU. Data were collected by scoring of the obstetric files after the patient
      had delivered.\nWe ascertained whether the obstetric history, syphilis testing,
      blood group testing, haemoglobin measurement and uterine growth assessment were
      performed during antenatal care along with whether appropriate action was taken.
      For intrapartum care, estimation of fetal weight, the performance of pelvimetry,
      blood pressure monitoring, urine testing, evaluation of head above pelvis, fetal
      heart rate monitoring, monitoring of contractions and plotting of cervical dilatation,
      and whether the appropriate actions were taken, were assessed.\nEight of the
      13 midwives at the two MOUs completed the PEP and all demonstrated an improvement
      in knowledge. Case notes of 303 patients from the various clinics were studied.
      There was no change in the referral patterns of any of the clinics during the
      study period. The obstetric history was well documented, but in no group was
      there a satisfactory response to a detected problem; appropriate action was
      taken in between 0% and 12% of cases. Syphilis testing was performed in 56-82%
      of cases, with no difference between the groups. The haemoglobin level was measured
      in only 4-15% of patients, with no difference before or after completion of
