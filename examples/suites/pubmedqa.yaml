      and classified 5-year breast cancer-specific prognosis among proband (mother
      or oldest sister) into tertiles as poor, intermediary, or good. We used Kaplan-Meier
      estimates of survival proportions and Cox models to calculate relative risks
      of dying from breast cancer within 5 years depending on the proband's outcome.\n\
      The 5-year survival proportion among daughters whose mothers died within 5 years
      was 87% compared to 91% if the mother was alive (p = 0.03). Among sisters, the
      corresponding proportions were 70% and 88%, respectively (p = 0.001). After
      adjustment for potential confounders, daughters and sisters of a proband with
      poor prognosis had a 60% higher 5-year breast cancer mortality compared to those
      of a proband with good prognosis (hazard ratio [HR], 1.6; 95% confidence interval
      [CI], 1.2 to 2.2; p for trend 0.002). This association was slightly stronger
      among sisters (HR, 1.8; 95% CI, 1.0 to 3.4) than among daughters (HR, 1.6; 95%
      CI, 1.1 to 2.3).\n\nQuestion: Is breast cancer prognosis inherited?\nAnswer
