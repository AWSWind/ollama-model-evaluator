    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nFirst,
      to establish whether a deprivation gradient in all-cause mortality exists for
      all ethnic groups within New Zealand; second, if such gradients do exist, whether
      their absolute slopes are the same; and third, if such gradients exist, what
      impact the unequal deprivation distributions of the different ethnic groups
      have on the observed ethnic inequalities in life expectancy at birth.\nAbridged
      lifetables for the period 1999-2003 were constructed using standard demographic
      methods for each of four ethnic groups (Asian, Pacific, Maori and European)
      by NZDep2001 quintile and sex. Gradients were estimated by fitting generalised
      linear models to the quintile-specific life expectancy estimates for each ethnic
      group (by sex). The contribution of variation in deprivation distributions to
      inter-ethnic inequalities in life expectancy was estimated by re-weighting the
      quintile-specific mortality rates for each ethnic group using weights derived
      from the European deprivation distribution and recalculating the lifetable.\n\
      All four ethnic groups exhibit deprivation gradients in all-cause mortality
