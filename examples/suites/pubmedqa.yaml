    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nTo
      compare the dose intensity and toxicity profiles for patients undergoing chemotherapy
      at the Townsville Cancer Centre (TCC), a tertiary cancer centre in northern
      Queensland, with those for patients treated in Mount Isa, supervised by the
