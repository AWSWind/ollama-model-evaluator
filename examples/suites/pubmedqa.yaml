    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nAs
      with some procedures, trauma fellowship training and greater surgeon experience
      may result in better outcomes following intramedullary nailing (IMN) of diaphyseal
      femur fractures. However, surgeons with such training and experience may not
      always be available to all patients. The purpose of this study is to determine
