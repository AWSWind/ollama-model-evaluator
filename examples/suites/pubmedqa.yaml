    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nWhether
      mutation status should be used to guide therapy is an important issue in many
      cancers. We correlated mutation profile in radioiodine-refractory (RAIR) metastatic
      thyroid cancers (TCs) with patient outcome and response to tyrosine kinase inhibitors
      (TKIs), and discussed the results with other published data.\nOutcome in 82
      consecutive patients with metastatic RAIR thyroid carcinoma prospectively tested
      for BRAF, RAS and PI3KCA mutations was retrospectively analyzed, including 55
      patients treated with multikinase inhibitors.\nPapillary thyroid carcinomas
      (PTCs) were the most frequent histological subtype (54.9 %), followed by poorly
      differentiated thyroid carcinoma [PDTC] (30.5 %) and follicular thyroid carcinoma
      [FTC](14.6 %). A genetic mutation was identified in 23 patients (28 %) and BRAF
