      nosocomial infection, after controlling for all important confounders. These
      models were then used to characterize the effect of gender in young and old
      age groups. Overall mortality, multiple organ failure, and nosocomial infection
      rates for the entire cohort (n = 1,036) were 20%, 40%, and 45%, respectively.
      Mean Injury Severity Score was 32 +/- 14 (mean +/- SD). Men (n = 680) and women
