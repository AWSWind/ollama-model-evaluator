    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nThe
      aim of the study was to evaluate, if elderly persons are sufficiently protected
      against infectious diseases by vaccination.\n300 elderly (>60 years) and 300
      young (<35 years) persons from five Austrian cities were recruited according
      to the criteria of a field study. Antibody concentrations against tetanus, diphtheria,
      tickborne encephalitis and influenza were assessed by ELISA or by haemagglutination
      inhibition test. Disease and vaccination histories were recorded.\nThe results
      of the study demonstrate that protection against infectious diseases was frequently
      insufficient in the elderly. This was partly due to the fact that old persons
      were not vaccinated according to recommended strategies. However, low antibody
      concentration and a short duration of protective humoral immunity were also
      observed in many elderly persons in spite of regular vaccination. This was not
      only the case in frail, but also in healthy elderlies.\n\nQuestion: Vaccine
      protection in the elderly: are Austrian seniors adequately protected by vaccinations?\n\
      Answer with exactly one word: yes, no, or maybe."
