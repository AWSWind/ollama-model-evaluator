      released edition of the TNM staging system for primary tumor classification
      in kidney cancer.\nOur multicenter retrospective study consisted of 5339 patients
      treated in 16 academic Italian centers.\nPatients underwent either radical or
      partial nephrectomy.\nUnivariable and multivariable Cox regression models addressed
      cancer-specific survival (CSS) after surgery.\nIn the study, 1897 patients (35.5%)
