      policy-making and health care practice. For each country, the process aimed
      to produce a national consensus list of the most important factors characterising
      good practice in health care for migrants.\nThe scoring procedures resulted
      in 10 to 16 factors being identified as the most important for each participating
      country. All 186 factors were aggregated into 9 themes: (1) easy and equal access
      to health care, (2) empowerment of migrants, (3) culturally sensitive health
      care services, (4) quality of care, (5) patient/health care provider communication,
      (6) respect towards migrants, (7) networking in and outside health services,
      (8) targeted outreach activities, and (9) availability of data about specificities
      in migrant health care and prevention. Although local political debate, level
      of immigration and the nature of local health care systems influenced the selection
      and rating of factors within each country, there was a broad European consensus
