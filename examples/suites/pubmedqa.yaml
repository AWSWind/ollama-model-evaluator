      and those who refused (refusers). Compared with other studies of refusers, relatively
      more information could be gathered with regard to both their characteristics
      and reasons for refusing, because all potential participants were invited personally.\n\
      Older patients from a Dutch outpatient clinic were invited to participate in
      a self-management intervention, and their characteristics were assessed. Demographic
      data were collected, as well as data on physical functioning and lack of emotional
      support. People who refused to participate were asked to give their reasons
      for refusing.\nOf the 361 patients invited, 267 (74%) refused participation.
      These refusers were more restricted in their mobility, lived further away from
