    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nTo
      examine age-related differences in the relationship between personality and
      coping strategies in an Australian population of psychiatric inpatients.\nConsenting
      eligible adults (N=238) from 18-100 years of age consecutively admitted to inpatient
      psychiatry units were assessed using the SCID I and II, the Coping Orientations
