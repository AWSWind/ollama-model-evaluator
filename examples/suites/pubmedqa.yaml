      practitioner referrals to private and NHS consultant-led services between 1
      January and 31 December 2001 from 10 general practices in the Trent Focus Collaborative
      Research Network, United Kingdom. Patient referrals were aggregated to give
      private and NHS referral rates for each electoral ward in each practice.\nOf
      17,137 referrals, 90.4 percent (15,495) were to the NHS and 9.6 percent (1642)
