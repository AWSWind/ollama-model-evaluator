      (NIHSS), time to treatment, hypertension, and blood glucose.\n369 patients had
      TCD examinations before or during IV rt-PA treatment. The 199 (53.9%) men and
      170 (46.1%) women had mean ages of 67 ± 13 and 70 ± 14 years, respectively.
      The sexes did not differ significantly in baseline stroke severity, time to
      TCD examination, or time to thrombolysis. Of the men, 68 (34.2%) had complete
      recanalization, 58 (29.1%) had partial recanalization, and 73 (36.6%) had no
      recanalization. Of the women, 53 (31.2%) had complete recanalization, 46 (27%)
