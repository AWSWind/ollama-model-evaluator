      acute experiments on 50-kg pigs. All animals were fed liquids for 3 days prior
      to procedure. The procedures were performed under general anesthesia with endotracheal
      intubation. The flexible endoscope was passed per orally into the stomach and
      puncture of the gastric wall was performed with a needle knife. The puncture
      was extended to create a 1.5-cm incision using a pull-type sphincterotome, and
