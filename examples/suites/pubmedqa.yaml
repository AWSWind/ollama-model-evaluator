    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nTo
      investigate whether the Patient Health Questionnaire-9 (PHQ-9) possesses the
      essential psychometric characteristics to measure depressive symptoms in people
      with visual impairment.\nThe PHQ-9 scale was completed by 103 participants with
