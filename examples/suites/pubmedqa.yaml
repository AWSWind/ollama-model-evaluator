      stone length (mm), and location, for both DT and NCCT. Mean differences per
      RU were compared. Potential variables affecting stone detection rate, including
      stone size and body mass index (BMI), were evaluated. Interobserver agreement
      was determined using the intraclass correlation coefficient to measure the consistency
      of measurements made by the readers.\nDT and NCCT demonstrated similar stone
      detection rates in terms of stone counts and stone area mm(2). Of the 79 RUs
      assessed, 41 RUs showed exact stone counts on DT and NCCT. The mean difference
      in stone area was 16.5 mm(2) (-4.6 to 38.5), p = 0.121. The mean size of the
      largest stone on NCCT and DT was 9.27 and 8.87 mm, respectively. Stone size
      and BMI did not cause a significant difference in stone detection rates. Interobserver
      agreement showed a strong correlation between readers and adequate reproducibility.\n\
