      or not she has a second baby, and on the spacing to the next birth.\nBetween
      October 1989 and July 1993, a total of 1860 women at low medical risk in early
      pregnancy, who participated in a randomized controlled trial of in-hospital
      birth center care versus standard care, gave birth. The 1063 primiparas in the
      trial, 543 in the birth center group and 520 in the standard care group, were
      included in a secondary analysis in which women's personal identification codes
      were linked to the Swedish National Birth Register, which included information
      about their subsequent birth during the following 7 to 10 years. Time to an
      event curves were constructed by means of the Kaplan Meier method.\nThe observation
      period after the first birth was on average 8.8 years in the birth center group
