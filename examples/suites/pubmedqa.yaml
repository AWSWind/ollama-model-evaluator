      auspices of the Townsville Teleoncology Network (TTN).\nEligible patients who
      received chemotherapy at TCC or Mt Isa Hospital between 1 May 2007 and 30 April
      2012.\nTeleoncology model for managing cancer patients in rural towns.\nDose
      intensity (doses, number of cycles and lines of treatment) and toxicity rates
      (rate of serious side effects, hospital admissions and mortality).\nOver 5 years,
      89 patients received a total of 626 cycles of various chemotherapy regimens
