      paid by patients and families were included. Utility was measured using SF-6D
      scores from the SF-12 questionnaire. Incremental cost-utility ratios (ICURs)
      were calculated using the mean annual estimates. A cost-effectiveness acceptability
      curve was determined using a Monte Carlo probabilistic simulation technique.\n\
      Nine FXD antiretroviral formulations approved by the U.S. Food and Drug Administration
      by 2005 was included in this study. One hundred seventy HIV/AIDS patients with
      ≥2 antiretroviral agents were identified from the MEPS database, of which 53%
