    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nOncology
      literature cites that only 2% to 4% of patients participate in research. Up
      to 85% of patients are unaware that clinical trials research is being conducted
      at their treatment facility or that they might be eligible to participate.\n\
      It was hypothesized that patients' satisfaction with information regarding clinical
      trials would improve after targeted educational interventions, and accruals
      to clinical trials would increase in the year following those interventions.\n\
      All new patients referred to the cancer center over a 4-month period were mailed
      a baseline survey to assess their knowledge of clinical research. Subsequently,
      educational interventions were provided, including an orientation session highlighting
      clinical trials, a pamphlet, and a reference to a clinical trials Web site.
      A postintervention survey was sent to the responders of the initial survey 3
      months after the initial mailing.\nPatient satisfaction with information significantly
      increased after the interventions. There was no increase in subsequent enrollment
      in clinical trials. Patients who indicated an inclination to participate in
      clinical trials tended to have greater satisfaction with the information they
      received.\n\nQuestion: Does increased patient awareness improve accrual into
      cancer-related clinical trials?\nAnswer with exactly one word: yes, no, or maybe."
