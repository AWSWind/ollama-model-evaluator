      Prospective Urban Rural Epidemiology study in the North West Province, South
      Africa, started in 2005 and included African volunteers (n = 1994; aged>30 years)
      from a sample of 6000 randomly selected households in rural and urban areas.\n\
      At baseline, 48% of the participants were hypertensive (≥ 140/90 mmHg). Those
      with optimal BP (n = 478) were followed at a success rate of 70% for 5 years
      (213 normotensive, 68 hypertensive, 57 deceased). Africans that became hypertensive
      smoked more than the normotensive individuals (68.2% vs 49.8%), and they also
      had a greater waist circumference [ratio of geometric means of 0.94 cm (95%
