    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nTo
      determine whether successful completion of the Perinatal Education Programme
      (PEP) improves obstetric practice.\nThe three midwife obstetric units (MOUs)
      in a health district of Mpumalanga were included in the study. Two MOUs enrolled
      in the PEP and the third did not. A 'before-and-after' study design was used
