      LVADs is presented to outline the benefits and limitations of device support
      in lieu of transplantation.\nDetailed records were kept prospectively for all
      patients undergoing LVAD insertion. Fifty-eight LVADs were inserted over 5 years,
      with a survival rate of 74%. Mean patient age was 50 years, and duration of
      support averaged 98 days. Although common, both preexisting infection and infection
      during LVAD support were not associated with increased mortality or decreased
      rate of successful transplantation. Thromboembolic complications were rare,
      occurring in only three patients (5%) despite the absence of anticoagulation.
      Ventricular arrhythmias were well tolerated in all patients except in cases
      of early perioperative right ventricular failure, with no deaths. Right ventricular
      failure occurred in one third of patients and was managed in a small percentage
      by right ventricular assist device (RVAD) support and/or inhaled nitric oxide
      therapy. There were no serious device malfunctions, but five graft-related hemorrhages
      resulted in two deaths. Finally, a variety of noncardiac surgical procedures
      were performed in LVAD recipients, with no major morbidity and mortality.\n\n\
      Question: Bridge experience with long-term implantable left ventricular assist
      devices. Are they an alternative to transplantation?\nAnswer with exactly one
      word: yes, no, or maybe."
