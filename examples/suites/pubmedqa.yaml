    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nDigital
      tomosynthesis (DT) is a new X-ray-based imaging technique that allows image
      enhancement with minimal increase in radiation exposure. The purpose of this
      study was to compare DT with noncontrast computed tomography (NCCT) and to evaluate
      its potential role for the follow-up of patients with nephrolithiasis in a nonemergent
      setting.\nA retrospective review of patients with nephrolithiasis at our institution
      that underwent NCCT and DT from July 2012 to September 2013 was performed. Renal
      units (RUs) that did not undergo treatment or stone passage were randomly assigned
