      (per institutional protocol) for version and length measurement of both the
      nailed and uninjured femurs. Exclusion criteria included bilateral injuries,
      multiple ipsilateral lower extremity fractures, previous injury, and previous
      deformity. Of the initial 417 subjects, 355 patients met our inclusion criteria.
      Other data included in our analysis were age, sex, injury mechanism, open vs.
      closed fracture, daytime vs. nighttime surgery, mechanism of injury, and AO
      and Winquist classifications. Post-operative femoral version of both lower extremities
      was measured on CT scanogram by an orthopaedic trauma fellowship trained surgeon.
      Standard univariate and multivariate analyses were performed to determine statistically
      significant risk factors for malrotation between the two cohorts.\nOverall,
      80.3% (288/355) of all fractures were fixed by trauma-trained surgeons. The
