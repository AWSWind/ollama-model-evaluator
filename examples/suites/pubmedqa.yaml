      records were retrospectively reviewed.\nTwo cases of haemolytic anaemia after
      aortic surgery using the elephant trunk technique were identified from 2011
      to 2013. A 64-year-old man, who underwent graft replacement of the ascending
      aorta for acute Stanford type A aortic dissection, presented with enlargement
      of the chronic dissection of the descending aorta and moderate aortic regurgitation.
      A two-stage surgery was scheduled. Total arch replacement with an elephant trunk
      in the true lumen and concomitant aortic valve replacement were performed. Postoperatively,
      he developed severe haemolytic anaemia because of the folded elephant trunk.
      The anaemia improved after the second surgery, including graft replacement of
      the descending aorta. Similarly, a 61-year-old man, who underwent total arch
      replacement for acute Stanford type A aortic dissection, presented with enlargement
      of the chronic dissection of the descending aorta. Graft replacement of the
