    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nAlthough
      the mechanism of muscle wasting in end-stage renal disease is not fully understood,
      there is increasing evidence that acidosis induces muscle protein degradation
      and could therefore contribute to the loss of muscle protein stores of patients
      on hemodialysis, a prototypical state of chronic metabolic acidosis (CMA). Because
