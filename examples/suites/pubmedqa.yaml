    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nTo
      determine current practice and to assess the value of routine follow-up procedures
      for endometrial cancer surveillance. To discuss whether such procedures are
      feasible and effective to identify asymptomatic recurrences and describe the
      pattern of relapse detected by procedures.\nThe records of 282 consecutive women
      with recurrent endometrial cancer treated from 1986 to 2005 were retrospectively
      collected in 8 Italian institutions. Primary disease, clinical history, and
      recurrence features and data were analyzed.\nThirty-five (12.4%) of 282 patients
      had recurrence in vaginal vault, 51 patients (18.0%) had recurrence in central
      pelvis, 14 patients (4.9%) had recurrence in pelvic wall, and 39 patients (13.8%)
      had recurrence in lymph nodes. One-hundred twenty-eight patients (45.3%) showed
      a distant relapse, whereas 15 patients (5.3%) developed both distant relapse
      and local relapse. The site of relapse influenced survival because the patients
      with vaginal vault recurrences lived significantly longer than the patients
      with recurrences in other sites. Eighty (28.4%) of the 282 patients became symptomatic
      and anticipated the scheduled visit, 37 (13.1 %) of the patients reported their
      symptoms during the follow-up meeting, and 165 (58.5 %) of the patients were
      asymptomatic and the diagnostic path was introduced by a planned visit or examination.
      Among the asymptomatic patients, the first procedure that led to further examinations
      was clinical visit alone for 60 (36.4%) of 165 patients, imaging for 103 patients
      (62.4%), and cytologic examination for 2 patients (1.2%). Symptoms at recurrence
      can predict survival: patients with an asymptomatic recurrence had a median
      survival time from relapse of 35 months versus 13 months if they had a symptomatic
      repetition (P = 0.0001).\n\nQuestion: Could different follow-up modalities play
      a role in the diagnosis of asymptomatic endometrial cancer relapses?\nAnswer
      with exactly one word: yes, no, or maybe."
