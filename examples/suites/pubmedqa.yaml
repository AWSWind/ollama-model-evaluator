    prompt: "Read the research abstract and answer the question.\n\nAbstract:\nIt
      is widely accepted that exemplary surgical care involves a surgeon's involvement
      in the preoperative, perioperative, and postoperative periods. In an era of
      ever-expanding therapeutic modalities available to the vascular surgeon, it
      is important that trainees gain experience in preoperative decision-making and
      how this affects a patient's operative and postoperative course. The purpose
      of this study was to define the current experience of residents on a vascular
      surgery service regarding the continuity of care they are able to provide for
      patients and the factors affecting this experience.\nThis prospective cohort
      study was approved by the Institutional Review Board and conducted at the University
      of British Columbia during January 2005. All patients who underwent a vascular
      procedure at either of the two teaching hospitals were included. In addition
      to type of case (emergent, outpatient, inpatient), resident demographic data
      and involvement in each patient's care (preoperative assessment, postoperative
