      The patient postoperatively developed haemolytic anaemia because of the folded
      elephant trunk, which improved after additional stent grafting into the elephant
      trunk.\n\nQuestion: Elephant trunk in a small-calibre true lumen for chronic
      aortic dissection: cause of haemolytic anaemia?\nAnswer with exactly one word:
