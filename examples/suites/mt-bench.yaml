    prompt: Write a function to find the majority element in a given integer 
      array using the Boyer-Moore Voting Algorithm.
    reference_data:
      category: coding
      reference:
        - "Check if they implement the classical algorithm correctly.\n\nSample answer:\n\
          ```\ndef majority_element(arr):\n    count = 0\n    candidate = None\n \
          \   # Boyer-Moore Voting Algorithm\n    for num in arr:\n        if count
          == 0:\n            candidate = num\n        count += (1 if num == candidate
          else -1)\n    # Verify if the candidate is indeed the majority element\n\
          \    if arr.count(candidate) > len(arr) // 2:\n        return candidate\n\
          \    else:\n        return None\n```"
        - "There is no simple modification based on the Boyer-Moore Voting Algorithm.
          Expected answer is to use a hash table.\n\n```\ndef topTwo(nums):\n    #
          Build a frequency map\n    frequency_map = {}\n    for num in nums:\n  \
          \      if num in frequency_map:\n            frequency_map[num] += 1\n \
          \       else:\n            frequency_map[num] = 1\n\n    # Find the top
          two most occurring elements\n    most_frequent = sorted(frequency_map.items(),
          key=lambda x: x[1], reverse=True)[:2]\n\n    return [num for num, _ in most_frequent]\n\
          ```"
    stop_sequences: null
