    prompt: Implement a program to find the common elements in two arrays 
      without using any extra data structures.
    reference_data:
      category: coding
      reference:
        - "O(n^2) or O(nlogn) is expected. The following is a O(n^2) solution. you
          can also sort them first and use two pointers.\n\n```\ndef find_common_elements(arr1,
          arr2):\n    common_elements = []\n    for i in range(len(arr1)):\n     \
          \   for j in range(len(arr2)):\n            if arr1[i] == arr2[j]:\n   \
          \             # Check if the element is already in the common_elements list\n\
          \                if arr1[i] not in common_elements:\n                  \
          \  common_elements.append(arr1[i])\n    return common_elements\n```"
        - "Simply use hash table (set or dict) to achieve O(n) time complexity.\n\n\
          ```\ndef find_common_elements(arr1, arr2):\n    set1 = set(arr1)\n    set2
          = set(arr2)\n    common_elements = set1.intersection(set2)\n    return list(common_elements)\n\
          ```"
