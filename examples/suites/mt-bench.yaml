          find_median(arr1, arr2):\n    n1 = len(arr1)\n    n2 = len(arr2)\n    if
          (n1 + n2) == 0:\n        return None\n\n    i, j = 0, 0\n    last_1, last_2
          = None, None\n\n    for k in range(1, (n1 + n2) // 2 + 2):\n        last_2
          = last_1\n        if j == n2:\n            last_1 = arr1[i]\n          \
          \  i += 1\n        elif i == n1:\n            last_1 = arr2[j]\n       \
          \     j += 1\n        elif arr1[i] < arr2[j]:\n            last_1 = arr1[i]\n\
          \            i += 1\n        else:\n            last_1 = arr2[j]\n     \
          \       j += 1\n        \n    if (n1 + n2) % 2 == 1:\n        return last_1\n\
          \    else:\n        return (last_1 + last_2) / 2\n```"
