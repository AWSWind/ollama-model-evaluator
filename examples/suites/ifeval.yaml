      in such a way that the quantum state of each particle of the group cannot be
      described independently of the state of the others, including when the particles
      are separated by a large distance. The topic of quantum entanglement is at the
      heart of the disparity between classical and quantum physics: entanglement is
      a primary feature of quantum mechanics not present in classical mechanics.\n\
      \nMeasurements of physical properties such as position, momentum, spin, and
      polarization performed on entangled particles can, in some cases, be found to
      be perfectly correlated. For example, if a pair of entangled particles is generated
      such that their total spin is known to be zero, and one particle is found to
      have clockwise spin on a first axis, then the spin of the other particle, measured
      on the same axis, is found to be anticlockwise. However, this behavior gives
      rise to seemingly paradoxical effects: any measurement of a particle's properties
      results in an apparent and irreversible wave function collapse of that particle
      and changes the original quantum state. With entangled particles, such measurements
      affect the entangled system as a whole.\n\nSuch phenomena were the subject of
      a 1935 paper by Albert Einstein, Boris Podolsky, and Nathan Rosen, and several
      papers by Erwin Schrödinger shortly thereafter, describing what came to be known
      as the EPR paradox. Einstein and others considered such behavior impossible,
      as it violated the local realism view of causality (Einstein referring to it
      as \"spooky action at a distance\") and argued that the accepted formulation
      of quantum mechanics must therefore be incomplete.\n\n"
